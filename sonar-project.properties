# Configuración de SonarQube para Planning GameXP
# ==============================================

# Información del proyecto
sonar.projectKey=planning-gamexp
sonar.projectName=Planning GameXP
sonar.projectVersion=1.2.0
sonar.sources=.

# Archivos y carpetas a analizar
sonar.inclusions=**/*.js,**/*.mjs,**/*.astro,**/*.css,**/*.html

# Archivos y carpetas a excluir del análisis
sonar.exclusions=**/node_modules/**,**/dist/**,**/.astro/**,**/coverage/**,**/test-results/**,**/public/firebase-*.js,**/public/css/kanban-status-colors.css,**/scripts/**,**/*.config.js,**/*.config.mjs

# Configuración de cobertura de tests
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Configuración de tests
sonar.tests=tests,playwright
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Excepciones de reglas
# =====================

# Configuración multicriteria para todas las excepciones
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10

# e1: Importaciones absolutas - Astro resuelve desde public/
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S6327
sonar.issue.ignore.multicriteria.e1.resourceKey=**/public/js/**/*.js

# e2: Importaciones absolutas en archivos principales
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S6327
sonar.issue.ignore.multicriteria.e2.resourceKey=**/main.js,**/app-controller.js,**/controllers/*.js

# e3: Console.log permitido para debugging controlado con sinsole
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S2228
sonar.issue.ignore.multicriteria.e3.resourceKey=**/utils/sinsole-log.js

# e4: Web Components de Lit - this es necesario en templates
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S4328
sonar.issue.ignore.multicriteria.e4.resourceKey=**/wc/**/*.js

# e5: Firebase requiere variables globales window para inicialización
sonar.issue.ignore.multicriteria.e5.ruleKey=javascript:S3798
sonar.issue.ignore.multicriteria.e5.resourceKey=**/services/firebase-*.js,**/firebase/**/*.js

# e6: Event listeners en Web Components - removeEventListener no siempre es necesario
sonar.issue.ignore.multicriteria.e6.ruleKey=javascript:S1530
sonar.issue.ignore.multicriteria.e6.resourceKey=**/wc/**/*.js

# e7: Complejidad cognitiva - Web Components grandes son normales
sonar.issue.ignore.multicriteria.e7.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.e7.resourceKey=**/wc/TaskCard.js,**/wc/BugCard.js,**/wc/EpicCard.js

# e8: Funciones con muchos parámetros - Firebase y APIs externas
sonar.issue.ignore.multicriteria.e8.ruleKey=javascript:S107
sonar.issue.ignore.multicriteria.e8.resourceKey=**/services/firebase-service.js

# e9: Archivos grandes - Web Components con lógica compleja
sonar.issue.ignore.multicriteria.e9.ruleKey=javascript:S104
sonar.issue.ignore.multicriteria.e9.resourceKey=**/wc/**/*.js,**/controllers/app-controller.js

# e10: Uso de alert/confirm para notificaciones del sistema
sonar.issue.ignore.multicriteria.e10.ruleKey=javascript:S2755
sonar.issue.ignore.multicriteria.e10.resourceKey=**/services/notification-*.js

# Configuración adicional de JavaScript/TypeScript
sonar.javascript.file.suffixes=.js,.jsx,.mjs
sonar.typescript.file.suffixes=.ts,.tsx

# Configuración de Lit y Web Components
sonar.javascript.environments=browser,es2021,webcomponents

# Encoding
sonar.sourceEncoding=UTF-8

# Server configuration (local SonarQube via Docker)
sonar.host.url=http://localhost:9001

# Umbral de duplicación (Web Components tienen patrones repetitivos)
sonar.cpd.exclusions=**/wc/**/*-styles.js,**/test/**,**/tests/**

# Comentarios sobre las excepciones
# =================================
# Este proyecto usa tecnologías específicas que requieren excepciones:
# - Astro: rutas absolutas desde public/
# - Lit: Web Components con this en templates
# - Firebase: APIs asíncronas y variables globales
# - JavaScript Vanilla: patrones que pueden parecer legacy pero son intencionales
