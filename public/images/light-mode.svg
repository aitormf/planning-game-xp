<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#circleClip)">
    <rect width="400" height="400" fill="#1a1a2e"/>
    
    <!-- Left eye - light fill -->
    <path d="M 18 160 L 195 160 Q 195 265 106 265 Q 18 265 18 160 Z" 
          fill="#e8e4dd" stroke="#cccccc" stroke-width="7" stroke-linejoin="round"/>
    
    <!-- Right eye - light fill -->
    <path d="M 205 160 L 382 160 Q 382 265 293 265 Q 205 265 205 160 Z" 
          fill="#e8e4dd" stroke="#cccccc" stroke-width="7" stroke-linejoin="round"/>
    
    <!-- Pupils group with animation -->
    <g>
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        dur="20s" 
        repeatCount="indefinite"
        keyTimes="0; 0.85; 0.875; 0.9; 0.925; 0.95; 0.975; 1"
        values="0,0; 0,0; -18,0; -18,0; 18,0; 18,0; 0,0; 0,0"
        calcMode="spline"
        keySplines="0 0 1 1; 0.4 0 0.6 1; 0 0 1 1; 0.4 0 0.6 1; 0 0 1 1; 0.4 0 0.6 1; 0 0 1 1"
      />
      
      <!-- Left pupil -->
      <circle cx="125" cy="215" r="20" fill="#2a2a2a"/>
      <circle cx="119" cy="208" r="5" fill="#fff" opacity="0.3"/>
      
      <!-- Right pupil -->
      <circle cx="312" cy="215" r="20" fill="#2a2a2a"/>
      <circle cx="306" cy="208" r="5" fill="#fff" opacity="0.3"/>
    </g>
    
    <!-- Left eyelid -->
    <path d="M 14 156 L 199 156 L 199 210 Q 106 182 14 210 Z" 
          fill="#1a1a2e" stroke="none"/>
    <path d="M 22 208 Q 106 180 192 208" fill="none" stroke="#888" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Right eyelid -->
    <path d="M 201 156 L 386 156 L 386 210 Q 293 182 201 210 Z" 
          fill="#1a1a2e" stroke="none"/>
    <path d="M 208 208 Q 293 180 378 208" fill="none" stroke="#888" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Lightbulb - OFF -->
    <g transform="translate(200, 95)">
      <path d="M -12 6 Q -14 -12 0 -22 Q 14 -12 12 6 Z" fill="#2a2a3e" stroke="#666" stroke-width="2.5"/>
      <path d="M -3 0 L 0 -10 L 3 0" fill="none" stroke="#444" stroke-width="1.5"/>
      <rect x="-8" y="6" width="16" height="9" rx="2" fill="#444" stroke="#666" stroke-width="2"/>
      <line x1="-8" y1="10" x2="8" y2="10" stroke="#555" stroke-width="1.5"/>
    </g>
  </g>
  
  <circle cx="200" cy="200" r="198" fill="none" stroke="#cccccc" stroke-width="4"/>
</svg>
